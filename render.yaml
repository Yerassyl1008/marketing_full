# https://render.com/docs/blueprint-spec
# После деплоя скопируй URL сервиса в Vercel: CRM_API_URL и NEXT_PUBLIC_API_URL

services:
  - type: web
    name: google-sheets-crm
    runtime: node
    plan: free
    rootDir: servers/google-sheets-crm
    # install: см. package.json scripts — при «только npm run build» в UI всё равно подтянутся deps
    buildCommand: (npm ci --no-audit --no-fund || npm install --no-audit --no-fund) && npm run build:compile && npm prune --omit=dev
    # Пустой Start Command в UI → Render запускает `npm start` (должен быть dist, не tsx)
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
