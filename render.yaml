# https://render.com/docs/blueprint-spec
# После деплоя скопируй URL сервиса в Vercel: CRM_API_URL и NEXT_PUBLIC_API_URL

services:
  - type: web
    name: google-sheets-crm
    runtime: node
    plan: free
    rootDir: servers/google-sheets-crm
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
